proxy_cache_path /tmp/nginx-tile-cache levels=1:2 keys_zone=tilecache:10m max_size=500m inactive=7d;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/x-protobuf;

    # OpenFreeMap tile proxy
    location /tiles/ {
        proxy_pass https://tiles.openfreemap.org/;
        proxy_set_header Host tiles.openfreemap.org;
        proxy_ssl_server_name on;
        proxy_cache tilecache;
        proxy_cache_valid 200 7d;
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # PMTiles Range Request support
    location ~* \.pmtiles$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # Static JSON data files - cache for 1 day
    location /data/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Runtime config - no cache
    location = /config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static assets with hash in filename - cache for 1 year
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images and fonts - cache for 7 days
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
