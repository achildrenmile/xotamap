name: Update Reference Data
on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 03:00 UTC
  workflow_dispatch: {}

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential libsqlite3-dev zlib1g-dev
          git clone https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install

      - name: Import reference data
        run: npm run import

      - name: Build PMTiles
        run: npm run build:pmtiles

      - name: Build overlap grid
        run: npm run build:overlaps

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update reference data"
          file_pattern: "public/data/**"
